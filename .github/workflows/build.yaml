name: build

on: [push, pull_request, workflow_dispatch]

jobs:
  rust-toolchain:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.read.outputs.channel }}
    steps:
    - uses: actions/checkout@v5
    - name: Read rust toolchain version
      id: read
      run: echo "channel=$(awk -F '\"' '/^channel/ {print $2}' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

  build:
    needs: rust-toolchain
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150 # vcpkg might take time from cold cache for 100 mins minimum.
    strategy:
      fail-fast: false
      matrix:
        BUILD_TYPE: ["Debug"] # "Release"
        os: [ windows-latest, ubuntu-latest ]
    steps:
    - uses: actions/checkout@v5

    - name: set env symcrypt
      shell: pwsh
      run: echo "SYMCRYPT_LIB_PATH=${PWD}/build/_deps/symcrypt_release-src/dll" >> $env:GITHUB_ENV

    - name: setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 
          8.0.x

    # install flatc
    - name: Install flatc windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://github.com/google/flatbuffers/releases/download/v25.12.19/Windows.flatc.binary.zip -OutFile flatc.zip
        Expand-Archive -Path flatc.zip -DestinationPath "$env:RUNNER_TEMP\flatc"
        echo "$env:RUNNER_TEMP\flatc" >> $env:GITHUB_PATH
    
    - name: Install flatc ubuntu
      if: runner.os == 'Linux'
      run: |
        wget https://github.com/google/flatbuffers/releases/download/v25.12.19/Linux.flatc.binary.clang++-18.zip
        unzip Linux.flatc.binary.clang++-18.zip
        sudo mv flatc /usr/local/bin/

    - name: Install protoc
      uses: taiki-e/install-action@protoc

    - name: Install rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ needs.rust-toolchain.outputs.channel }}
        components: rustfmt, clippy

    - name: Setup vcpkg (it does not install any package yet)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: f3e10653cc27d62a37a3763cd84b38bca07c6075
      env:
          VCPKG_BINARY_SOURCES: default,rw

    - name: Set up binary cache
      uses: actions/cache@v4
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-binary-cache-${{ hashFiles('vcpkg*.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binary-cache-

    # - name: Run CMake consuming CMakePreset.json and run vcpkg to build dependencies
    #   uses: lukka/run-cmake@v10
    #   with:
    #     # This is the name of the CMakePresets.json's configuration to use to generate
    #     # the project files. This configuration leverages the vcpkg.cmake toolchain file to
    #     # run vcpkg and install all dependencies specified in vcpkg.json.
    #     configurePreset: 'default'
    #     # This is the name of the CMakePresets.json's configuration to build the project.
    #     buildPreset: 'build'
    #     buildPresetAdditionalArgs: "['--config', '${{ matrix.BUILD_TYPE }}']"
    #     testPreset: 'test'
    #     testPresetAdditionalArgs: "['--config', '${{ matrix.BUILD_TYPE }}']"

    - name: run cmake
      run: > 
        cmake . -DCMAKE_BUILD_TYPE=${{ matrix.BUILD_TYPE }} -B build
    - name: run build
      run: cmake --build build --config ${{ matrix.BUILD_TYPE }}
      env:
        Platform: "" # for dotnet build var not mix with cpp

    - name: Run cargo check
      run: cargo check --all-targets

    - name: Run cargo fmt
      run: cargo fmt --all -- --check
    
    - name: Run cargo clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: run all rust unit tests
      run: cargo test --all-targets

    - name: dotnet format
      run: dotnet format --verify-no-changes

    - name: run all dotnet tests
      run: dotnet test