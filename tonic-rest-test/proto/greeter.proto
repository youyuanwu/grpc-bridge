syntax = "proto3";

package greeter;

import "google/api/annotations.proto";

service Greeter {
  rpc SayHello(HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      post: "/v1/sayhello"
      body: "*"
    };
  }

  rpc GetGreeting(GetGreetingRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/v1/greeting/{name}"
    };
  }
}

message HelloRequest {
  string name = 1;
}

message GetGreetingRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
